<!DOCTYPE html>
<html lang="pt-br"><head><meta charset="UTF-8"><title>Nova Nota de Entrada</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head>
    <link rel="stylesheet" href="{{ url_for('static', filename='ui-v2.css') }}">
<body><div class="container">{% include '_menu.html' %}<h1>Nova Nota / Evento de Entrada</h1>
{% if erro %}<div class="mensagem-erro">{{ erro }}</div>{% endif %}
<div class="info-resumo"><p><strong>Compra normal:</strong> entra no estoque e atualiza custos.</p><p><strong>Bonificação:</strong> entra no estoque sem exigir valor faturado.</p><p><strong>Sem estoque:</strong> registra a despesa no centro de custo.</p></div>
<form method="POST" class="card-usuario form-grid-profissional">
<div class="campo-form"><label>Fornecedor</label><select name="fornecedor_id" required><option value="">Selecione</option>{% for f in fornecedores %}<option value="{{ f.id }}">{{ f.nome }}</option>{% endfor %}</select></div>
<div class="campo-form"><label>Número</label><input name="numero" required></div><div class="campo-form"><label>Série</label><input name="serie"></div>
<div class="campo-form"><label>Data emissão</label><input type="date" name="data_emissao"></div><div class="campo-form"><label>Data entrada</label><input type="date" name="data_entrada" value="{{ hoje }}" required></div>
<div class="campo-form"><label>Pedido de compra (opcional)</label><select name="pedido_compra_id"><option value="">Sem vínculo</option>{% for p in pedidos %}<option value="{{ p.id }}">#{{ p.id }} — {{ p.solicitante }} — {{ p.total_itens }} itens</option>{% endfor %}</select></div>
<div class="campo-form campo-span-2"><label>Chave de acesso (opcional)</label><input name="chave_acesso" maxlength="60"></div>
<div class="campo-form"><label>Desconto geral</label><input type="number" step="0.01" min="0" name="desconto_geral" value="0"></div><div class="campo-form"><label>Frete</label><input type="number" step="0.01" min="0" name="frete" value="0"></div><div class="campo-form"><label>Outras despesas</label><input type="number" step="0.01" min="0" name="outras_despesas" value="0"></div>
<div class="campo-form campo-span-3"><label>Observação</label><textarea name="observacao" rows="3"></textarea></div>
<div class="campo-span-3 botoes-metas"><button class="btn-salvar-producao">Criar Rascunho</button><a href="/compras/notas" class="btn-link-avulsas">Cancelar</a></div>
</form></div></body></html>
